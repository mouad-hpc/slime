name: Build GPU Runner Image

on:
  push:
    branches: [main]
    paths:
      - infra/runner/Dockerfile
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: infra/runner
          push: true
          tags: ghcr.io/osmosis-ai/slime-rl/arc-gpu-runner:latest
