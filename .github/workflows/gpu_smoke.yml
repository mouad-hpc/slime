name: gpu-smoke
on:
  workflow_dispatch:
jobs:
  gpu-smoke:
    name: GPU smoke test on ARC runner
    runs-on: limes-gpu-runners
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: GPU smoke test
        shell: bash
        run: |
          nvidia-smi
          python -c "import torch; print('CUDA available:', torch.cuda.is_available()); print('GPUs:', torch.cuda.device_count())"
