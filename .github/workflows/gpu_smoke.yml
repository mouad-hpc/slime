name: gpu-smoke
on:
  workflow_dispatch:
jobs:
  gpu-smoke:
    name: GPU smoke test on ARC runner
    runs-on: limes-gpu-runners
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker state
        shell: bash
        run: |
          set -euxo pipefail
          docker version
          docker info

      - name: Pull CUDA test image
        shell: bash
        run: |
          set -euxo pipefail
          docker pull nvidia/cuda:12.4.1-base-ubuntu22.04

      - name: Run GPU container smoke test
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            --runtime=nvidia \
            -e NVIDIA_VISIBLE_DEVICES=all \
            --ipc=host \
            --shm-size=16g \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            nvidia/cuda:12.4.1-base-ubuntu22.04 \
            nvidia-smi
